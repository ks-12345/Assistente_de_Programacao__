<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="shortcut icon" href="../imgs/pip_cabeça.png" type="image/x-icon">
  <title>Pip.IA — Cadastro</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="cadastro.css"/>
</head>
<body>

  <!-- Partículas de fundo -->
  <div class="particles">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>

  <!-- Card de Cadastro -->
  <div class="cadastro-wrapper">

    <!-- Lado esquerdo — apresentação -->
    <div class="cadastro-left">
      <div class="robot-glow">
                <img id="logo" src="../imgs/pip_cabeça.png" alt="logo do pip">

      </div>
      <h1>Pip<span>.IA</span></h1>
      <p>Crie sua conta e tenha acesso ao seu assistente de programação com Inteligência Artificial.</p>

      <div class="steps">
        <div class="step">
          <div class="step-num">1</div>
          <div class="step-text">Crie sua conta</div>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <div class="step-num">2</div>
          <div class="step-text">Faça login</div>
        </div>
        <div class="step-line"></div>
        <div class="step">
          <div class="step-num">3</div>
          <div class="step-text">Comece a codar</div>
        </div>
      </div>

      <a href="login.html" class="btn-voltar">← Já tenho conta</a>
    </div>

    <!-- Lado direito — formulário -->
    <div class="cadastro-right">
      <div class="form-header">
        <h2>Criar conta</h2>
        <p>Preencha os dados abaixo para se cadastrar</p>
      </div>

      <!-- Nome -->
      <div class="form-group">
        <label for="nome">Nome completo</label>
        <div class="input-box">
          <span class="input-icon">👤</span>
          <input type="text" id="nome" placeholder="Digite seu nome"/>
        </div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">E-mail</label>
        <div class="input-box">
          <span class="input-icon">📧</span>
          <input type="email" id="email" placeholder="Digite seu e-mail"/>
        </div>
      </div>

      <!-- Senha -->
      <div class="form-group">
        <label for="senha">Senha</label>
        <div class="input-box">
          <span class="input-icon">🔒</span>
          <input type="password" id="senha" placeholder="Crie uma senha"/>
          <button class="toggle-senha" onclick="toggleSenha('senha')" title="Mostrar/ocultar senha">👁️</button>
        </div>
      </div>

      <!-- Confirmar senha -->
      <div class="form-group">
        <label for="confirmarSenha">Confirmar senha</label>
        <div class="input-box" id="boxConfirmar">
          <span class="input-icon">🔒</span>
          <input type="password" id="confirmarSenha" placeholder="Repita a senha" oninput="verificarSenha()"/>
          <button class="toggle-senha" onclick="toggleSenha('confirmarSenha')" title="Mostrar/ocultar senha">👁️</button>
        </div>
        <span class="msg-erro" id="erroSenha"></span>
      </div>

      <button class="btn-cadastro" onclick="fazerCadastro()">
        <span>Criar conta</span>
        <span class="btn-arrow">→</span>
      </button>

      <p class="rodape">Trabalho Escolar · Powered by <strong>Google Gemini</strong></p>
    </div>

  </div>

  <script src="../backend/cadastro.js"></script>
</body>
</html>
