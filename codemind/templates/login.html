{% extends "base.html" %}
{% block title %}Login — Pip-I.A{% endblock %}

{% block content %}
<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">
        <img src="../static/css/imgs/pip_cabeça.png" alt="Mascote Pip-I.A" srcset="">
      </div>
      <h1>Pip-I.A</h1>
      <p>Assistente de Programação com IA</p>
    </div>

    {% if erro %}
    <div class="alert alert-error">{{ erro }}</div>
    {% endif %}

    {% if request.args.get('sucesso') %}
    <div class="alert alert-success">Cadastro realizado! Faça login.</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com" required />
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn-primary">Entrar</button>
    </form>

    <p class="auth-link">Não tem conta? <a href="/cadastro">Cadastre-se</a></p>
  </div>
</div>
{% endblock %}
